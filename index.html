<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lakey Wrestling</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link href="https://fonts.cdnfonts.com/css/bebas-neue" rel="stylesheet">
  <link href="css/site.css" rel="stylesheet">
  <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>
  <div class="page-background container">
    <div class="row">
      <div class="col-12">
        <h1 class="display-1 fw-bold text-center mt-4">Lakey Wrestling</h1>
      </div>
    </div>

    <div class="row mt-3">
      <div class="col-12">
        <section class="hero-center" aria-label="Featured team photos">
          <div class="hero-grid">
            <figure class="hero-photo m-0">
              <img src="img/POR_7575.jpg" alt="Owasso wrestler doing a one-hand handstand at center mat" loading="eager">
              <figcaption class="hero-copy">
                <p class="hero-kicker">Front And Center</p>
                <p class="hero-line">Power. Balance. Showmanship.</p>
              </figcaption>
            </figure>
            <figure class="hero-photo m-0">
              <img src="img/HVL_1565.jpg" alt="Owasso Rams wrestling team group portrait on the mat" loading="eager">
              <figcaption class="hero-copy">
                <p class="hero-kicker">Owasso Rams</p>
                <p class="hero-line">One Team. One Mat. One Standard.</p>
              </figcaption>
            </figure>
          </div>
        </section>
      </div>
    </div>

    <div class="row mt-4">
      <div class="col-12">
        <section class="section-shell" aria-labelledby="videos-heading">
          <h2 id="videos-heading" class="text-center mb-3">Video Spotlight</h2>
          <div class="spotlight-frame">
            <div id="spotlight-player" aria-label="Featured video player"></div>
          </div>
          <div class="spotlight-meta">
            <p class="spotlight-title" id="spotlight-title">Loading videos...</p>
            <p class="spotlight-sub" id="spotlight-sub">Preparing the latest videos.</p>
          </div>
          <div class="rail-wrap">
            <div class="video-rail" id="video-rail" role="listbox" aria-label="Video thumbnails"></div>
          </div>
          <div class="feed-status" id="video-status" aria-live="polite"></div>
          <div class="retry-wrap" id="video-retry-wrap">
            <button id="video-retry" class="btn btn-retry" type="button">Retry Videos</button>
          </div>
        </section>
      </div>
    </div>

    <div class="row mt-5">
      <div class="col-12">
        <section class="section-shell" aria-labelledby="facebook-heading">
          <h2 id="facebook-heading" class="text-center mb-4">Owasso Athletics Feeds</h2>
          <div id="fb-root"></div>
          <div class="fb-feed-wrapper">
            <div class="fb-page-container">
              <div class="fb-page"
                data-href="https://www.facebook.com/OwassoRamsHSWrestling"
                data-tabs="timeline"
                data-small-header="true"
                data-adapt-container-width="true"
                data-hide-cover="false"
                data-show-facepile="false"
                data-height="800">
                <blockquote cite="https://www.facebook.com/OwassoRamsHSWrestling" class="fb-xfbml-parse-ignore">
                  <a href="https://www.facebook.com/OwassoRamsHSWrestling">Owasso Rams HS Wrestling</a>
                </blockquote>
              </div>
            </div>
            <div class="fb-page-container">
              <div class="fb-page"
                data-href="https://www.facebook.com/owassoathletics"
                data-tabs="timeline"
                data-small-header="true"
                data-adapt-container-width="true"
                data-hide-cover="false"
                data-show-facepile="false"
                data-height="800">
                <blockquote cite="https://www.facebook.com/owassoathletics" class="fb-xfbml-parse-ignore">
                  <a href="https://www.facebook.com/owassoathletics">Owasso Athletics</a>
                </blockquote>
              </div>
            </div>
            <div class="fb-page-container">
              <div class="fb-page"
                data-href="https://www.facebook.com/owassotrack"
                data-tabs="timeline"
                data-small-header="true"
                data-adapt-container-width="true"
                data-hide-cover="false"
                data-show-facepile="false"
                data-height="800">
                <blockquote cite="https://www.facebook.com/owassotrack" class="fb-xfbml-parse-ignore">
                  <a href="https://www.facebook.com/owassotrack">Owasso Track</a>
                </blockquote>
              </div>
            </div>
          </div>
        </section>
      </div>
    </div>
  </div>

  <script async defer crossorigin="anonymous" src="https://connect.facebook.net/en_US/sdk.js#xfbml=1&version=v19.0" nonce="fbSDK"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="js/site.js"></script>
</body>
</html>
