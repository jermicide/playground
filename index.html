<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lakey Wrestling</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link href="https://fonts.cdnfonts.com/css/bebas-neue" rel="stylesheet">
  <script src="https://www.youtube.com/iframe_api"></script>
  <style>
    :root {
      --overlay-start: rgba(79, 0, 0, 0.35);
      --overlay-end: rgba(24, 0, 0, 0.82);
      --surface: rgba(20, 20, 20, 0.78);
      --surface-strong: rgba(12, 12, 12, 0.9);
      --accent: #ef4f4f;
      --accent-strong: #d81717;
      --text: #f5f5f5;
      --muted: #cdc7c7;
      --border-soft: rgba(255, 255, 255, 0.15);
    }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background-color: #000;
      color: var(--text);
    }

    .page-background {
      background-image: url('owassorams.webp');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      min-height: 100%;
      position: relative;
      padding-bottom: 4rem;
    }

    .page-background::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 20%, rgba(255, 81, 81, 0.2), transparent 40%),
        linear-gradient(var(--overlay-start), var(--overlay-end));
      z-index: -1;
    }

    h1, h2 {
      color: #fff;
      text-shadow:
        -1px -1px 0 #000000,
        1px -1px 0 #000000,
        -1px 1px 0 #000000,
        1px 1px 0 #000000;
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 0.04em;
    }

    .section-shell {
      background: linear-gradient(165deg, var(--surface), var(--surface-strong));
      border: 1px solid var(--border-soft);
      border-radius: 1rem;
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(4px);
      padding: 1rem;
    }

    .hero-center {
      border-radius: 1rem;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background:
        radial-gradient(circle at 82% 8%, rgba(255, 125, 125, 0.18), transparent 40%),
        linear-gradient(160deg, rgba(12, 12, 12, 0.9), rgba(36, 5, 5, 0.88));
      padding: 1rem;
      box-shadow: 0 16px 30px rgba(0, 0, 0, 0.45);
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 1.8fr);
      gap: 0.9rem;
      align-items: stretch;
    }

    .hero-photo {
      position: relative;
      border-radius: 0.85rem;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.16);
      min-height: 240px;
      transform: translateZ(0);
    }

    .hero-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: saturate(1.08) contrast(1.05);
      transition: transform 220ms ease;
    }

    .hero-photo:hover img,
    .hero-photo:focus-within img {
      transform: scale(1.03);
    }

    .hero-photo::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(0deg, rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.05) 42%, rgba(0, 0, 0, 0));
      pointer-events: none;
    }

    .hero-copy {
      position: absolute;
      left: 0.75rem;
      right: 0.75rem;
      bottom: 0.6rem;
      z-index: 2;
    }

    .hero-kicker {
      margin: 0;
      font-size: 0.73rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #f7d0d0;
      font-weight: 700;
    }

    .hero-line {
      margin: 0.16rem 0 0;
      color: #fff;
      font-size: 1.02rem;
      line-height: 1.18;
      font-weight: 700;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.7);
    }

    .spotlight-frame {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      border-radius: 0.75rem;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: #000;
    }

    #spotlight-player,
    #spotlight-player iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .spotlight-meta {
      margin-top: 0.75rem;
      padding: 0.75rem;
      border-radius: 0.75rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .spotlight-title {
      margin: 0;
      color: #fff;
      font-size: 1.15rem;
      font-weight: 600;
      line-height: 1.35;
    }

    .spotlight-sub {
      margin: 0.35rem 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .rail-wrap {
      margin-top: 1rem;
      padding: 0.5rem;
      border-radius: 0.85rem;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(0, 0, 0, 0.22);
    }

    .video-rail {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(190px, 220px);
      gap: 0.75rem;
      overflow-x: auto;
      overscroll-behavior-x: contain;
      padding-bottom: 0.25rem;
      scroll-snap-type: x mandatory;
      scrollbar-width: thin;
    }

    .thumb-button {
      scroll-snap-align: start;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 0.65rem;
      background: rgba(255, 255, 255, 0.04);
      color: #fff;
      padding: 0;
      text-align: left;
      transition: transform 140ms ease, border-color 140ms ease, box-shadow 140ms ease;
    }

    .thumb-button:hover,
    .thumb-button:focus-visible {
      transform: translateY(-2px);
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(239, 79, 79, 0.25);
      outline: none;
    }

    .thumb-button.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(239, 79, 79, 0.28);
    }

    .thumb-media {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      border-radius: 0.52rem 0.52rem 0 0;
      display: block;
    }

    .thumb-copy {
      padding: 0.5rem 0.65rem 0.65rem;
    }

    .thumb-title {
      font-size: 0.87rem;
      line-height: 1.25;
      margin: 0;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .thumb-date {
      color: var(--muted);
      font-size: 0.77rem;
      margin-top: 0.25rem;
    }

    .feed-status {
      min-height: 1.6rem;
      margin-top: 0.8rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .retry-wrap {
      margin-top: 0.5rem;
      display: none;
    }

    .btn-retry {
      border: 1px solid rgba(255, 255, 255, 0.4);
      color: #fff;
      background: transparent;
      border-radius: 999px;
      padding: 0.3rem 0.8rem;
      font-size: 0.85rem;
    }

    .btn-retry:hover,
    .btn-retry:focus-visible {
      border-color: var(--accent);
      color: #fff;
      outline: none;
    }

    .skeleton {
      animation: skeletonPulse 1.2s ease-in-out infinite;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.05));
      background-size: 200% 100%;
    }

    .video-skeleton {
      border: 2px solid rgba(255, 255, 255, 0.18);
      border-radius: 0.65rem;
      overflow: hidden;
    }

    .video-skeleton .media {
      width: 100%;
      aspect-ratio: 16 / 9;
    }

    .video-skeleton .line {
      height: 0.7rem;
      margin: 0.55rem;
      border-radius: 0.35rem;
    }

    .social-skeleton {
      grid-column: span 4;
      border-radius: 0.75rem;
      border: 1px solid rgba(255, 255, 255, 0.12);
      overflow: hidden;
    }

    .social-skeleton .media {
      width: 100%;
      aspect-ratio: 16 / 10;
    }

    .social-skeleton .line {
      height: 0.7rem;
      margin: 0.6rem;
      border-radius: 0.35rem;
    }

    @keyframes skeletonPulse {
      0% {
        background-position: 200% 0;
      }
      100% {
        background-position: -200% 0;
      }
    }

    .social-grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 0.9rem;
    }

    .social-card {
      grid-column: span 4;
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
      border-radius: 0.75rem;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.12);
      transition: transform 140ms ease, border-color 140ms ease;
    }

    .social-card:hover,
    .social-card:focus-visible {
      transform: translateY(-2px);
      border-color: var(--accent);
      outline: none;
    }

    .social-image {
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      display: block;
      background: rgba(255, 255, 255, 0.08);
    }

    .social-copy {
      padding: 0.75rem;
    }

    .social-title {
      margin: 0;
      font-size: 1rem;
      line-height: 1.3;
      color: #fff;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .social-meta {
      margin-top: 0.45rem;
      color: var(--muted);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .load-more-wrap {
      margin-top: 0.85rem;
      display: flex;
      justify-content: center;
    }

    .btn-feed {
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      border: 0;
      border-radius: 999px;
      padding: 0.45rem 1rem;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .btn-feed:disabled {
      opacity: 0.45;
    }

    @media (max-width: 991.98px) {
      .hero-grid {
        grid-template-columns: 1fr;
      }

      .social-card,
      .social-skeleton {
        grid-column: span 6;
      }
    }

    @media (max-width: 767.98px) {
      h1 {
        margin: 2rem 0 1rem !important;
      }

      .page-background.container {
        padding-left: 0.6rem;
        padding-right: 0.6rem;
      }

      .section-shell {
        padding: 0.75rem;
      }

      .hero-center {
        padding: 0.7rem;
      }

      .hero-photo {
        min-height: 210px;
      }

      .hero-line {
        font-size: 0.95rem;
      }

      .video-rail {
        grid-auto-columns: minmax(160px, 180px);
      }

      .social-card,
      .social-skeleton {
        grid-column: span 12;
      }
    }
  </style>
</head>
<body>
  <div class="page-background container">
    <div class="row">
      <div class="col-12">
        <h1 class="display-1 fw-bold text-center mt-4">Lakey Wrestling</h1>
      </div>
    </div>

    <div class="row mt-3">
      <div class="col-12">
        <section class="hero-center" aria-label="Featured team photos">
          <div class="hero-grid">
            <figure class="hero-photo m-0">
              <img src="img/POR_7575.jpg" alt="Owasso wrestler doing a one-hand handstand at center mat" loading="eager">
              <figcaption class="hero-copy">
                <p class="hero-kicker">Front And Center</p>
                <p class="hero-line">Power. Balance. Showmanship.</p>
              </figcaption>
            </figure>
            <figure class="hero-photo m-0">
              <img src="img/HVL_1565.jpg" alt="Owasso Rams wrestling team group portrait on the mat" loading="eager">
              <figcaption class="hero-copy">
                <p class="hero-kicker">Owasso Rams</p>
                <p class="hero-line">One Team. One Mat. One Standard.</p>
              </figcaption>
            </figure>
          </div>
        </section>
      </div>
    </div>

    <div class="row mt-4">
      <div class="col-12">
        <section class="section-shell" aria-labelledby="videos-heading">
          <h2 id="videos-heading" class="text-center mb-3">Video Spotlight</h2>
          <div class="spotlight-frame">
            <div id="spotlight-player" aria-label="Featured video player"></div>
          </div>
          <div class="spotlight-meta">
            <p class="spotlight-title" id="spotlight-title">Loading videos...</p>
            <p class="spotlight-sub" id="spotlight-sub">Preparing the latest videos.</p>
          </div>
          <div class="rail-wrap">
            <div class="video-rail" id="video-rail" role="listbox" aria-label="Video thumbnails"></div>
          </div>
          <div class="load-more-wrap">
            <button id="load-more-videos" class="btn btn-feed" type="button">Load More Videos</button>
          </div>
          <div class="feed-status" id="video-status" aria-live="polite"></div>
          <div class="retry-wrap" id="video-retry-wrap">
            <button id="video-retry" class="btn btn-retry" type="button">Retry Videos</button>
          </div>
        </section>
      </div>
    </div>

    <div class="row mt-5">
      <div class="col-12">
        <section class="section-shell" aria-labelledby="social-heading">
          <h2 id="social-heading" class="text-center mb-3">Social Feed</h2>
          <div id="social-grid" class="social-grid"></div>
          <div id="social-status" class="feed-status" aria-live="polite"></div>
          <div class="retry-wrap" id="social-retry-wrap">
            <button id="social-retry" class="btn btn-retry" type="button">Retry Social Feed</button>
          </div>
        </section>
      </div>
    </div>

    <div class="row mt-5">
      <div class="col-12">
        <section class="section-shell" aria-labelledby="facebook-heading">
          <h2 id="facebook-heading" class="text-center mb-3">Facebook</h2>
          <div class="d-flex justify-content-center">
            <div id="fb-root"></div>
            <div class="fb-page"
              data-href="https://www.facebook.com/OwassoRamsHSWrestling"
              data-tabs="timeline"
              data-width="500"
              data-small-header="false"
              data-adapt-container-width="true"
              data-hide-cover="false"
              data-show-facepile="false">
              <blockquote cite="https://www.facebook.com/OwassoRamsHSWrestling" class="fb-xfbml-parse-ignore">
                <a href="https://www.facebook.com/OwassoRamsHSWrestling">Owasso Rams HS Wrestling</a>
              </blockquote>
            </div>
          </div>
        </section>
      </div>
    </div>
  </div>

  <script async defer crossorigin="anonymous" src="https://connect.facebook.net/en_US/sdk.js#xfbml=1&version=v19.0" nonce="fbSDK"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script>
    const PLAYLIST_ID = 'PLx3fyeqr0GmvVB8Vlh0b8W3uHSRYzWKr0';
    const VIDEO_PAGE_SIZE = 8;
    const SOCIAL_PAGE_SIZE = 12;

    let videos = [];
    let activeVideoIndex = 0;
    let nextPageToken = null;
    let isLoadingVideos = false;
    let isYouTubeApiReady = false;
    let player = null;

    const rail = document.getElementById('video-rail');
    const videoStatus = document.getElementById('video-status');
    const socialStatus = document.getElementById('social-status');
    const loadMoreButton = document.getElementById('load-more-videos');
    const spotlightTitle = document.getElementById('spotlight-title');
    const spotlightSub = document.getElementById('spotlight-sub');
    const socialGrid = document.getElementById('social-grid');
    const videoRetryWrap = document.getElementById('video-retry-wrap');
    const socialRetryWrap = document.getElementById('social-retry-wrap');
    const videoRetryButton = document.getElementById('video-retry');
    const socialRetryButton = document.getElementById('social-retry');

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function formatDate(isoDate) {
      if (!isoDate) {
        return 'Unknown date';
      }

      const date = new Date(isoDate);
      if (Number.isNaN(date.getTime())) {
        return 'Unknown date';
      }

      return new Intl.DateTimeFormat('en-US', {
        month: 'short',
        day: 'numeric',
        year: 'numeric'
      }).format(date);
    }

    function updateVideoStatus(message) {
      videoStatus.textContent = message;
    }

    function updateSocialStatus(message) {
      socialStatus.textContent = message;
    }

    function setRetryVisibility(type, visible) {
      if (type === 'videos') {
        videoRetryWrap.style.display = visible ? 'block' : 'none';
        return;
      }

      socialRetryWrap.style.display = visible ? 'block' : 'none';
    }

    function renderVideoSkeletons() {
      rail.innerHTML = '';
      const count = 4;
      for (let index = 0; index < count; index += 1) {
        const card = document.createElement('div');
        card.className = 'video-skeleton';
        card.innerHTML = `
          <div class="media skeleton"></div>
          <div class="line skeleton"></div>
        `;
        rail.appendChild(card);
      }
    }

    function renderSocialSkeletons() {
      socialGrid.innerHTML = '';
      const count = 6;
      for (let index = 0; index < count; index += 1) {
        const card = document.createElement('div');
        card.className = 'social-skeleton';
        card.innerHTML = `
          <div class="media skeleton"></div>
          <div class="line skeleton"></div>
          <div class="line skeleton"></div>
        `;
        socialGrid.appendChild(card);
      }
    }

    function renderRail() {
      rail.innerHTML = '';

      videos.forEach((video, index) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = `thumb-button ${index === activeVideoIndex ? 'active' : ''}`;
        button.dataset.index = String(index);
        button.setAttribute('role', 'option');
        button.setAttribute('aria-selected', index === activeVideoIndex ? 'true' : 'false');
        button.setAttribute('aria-label', `Play ${video.title}`);

        const thumbUrl = video.thumbnails.medium || video.thumbnails.high || video.thumbnails.default || '';
        button.innerHTML = `
          <img class="thumb-media" src="${escapeHtml(thumbUrl)}" alt="${escapeHtml(video.title)} thumbnail" loading="lazy">
          <div class="thumb-copy">
            <p class="thumb-title">${escapeHtml(video.title)}</p>
            <div class="thumb-date">${escapeHtml(formatDate(video.publishedAt))}</div>
          </div>
        `;

        button.addEventListener('click', () => {
          setActiveVideo(index, true, true);
        });

        rail.appendChild(button);
      });

      loadMoreButton.disabled = !nextPageToken || isLoadingVideos;
    }

    function renderSpotlightCopy(video) {
      spotlightTitle.textContent = video.title || 'Untitled video';
      spotlightSub.textContent = `${formatDate(video.publishedAt)}${video.channelTitle ? ` • ${video.channelTitle}` : ''}`;
    }

    function ensurePlayer(videoId, autoplay) {
      if (!isYouTubeApiReady || !videoId) {
        return;
      }

      if (player) {
        player.loadVideoById(videoId);
        if (!autoplay) {
          player.pauseVideo();
        }
        return;
      }

      player = new YT.Player('spotlight-player', {
        videoId,
        playerVars: {
          autoplay: autoplay ? 1 : 0,
          rel: 0,
          modestbranding: 1
        }
      });
    }

    function setActiveVideo(index, autoplay, shouldFocus) {
      const video = videos[index];
      if (!video) {
        return;
      }

      activeVideoIndex = index;
      renderSpotlightCopy(video);
      ensurePlayer(video.videoId, autoplay);

      document.querySelectorAll('.thumb-button').forEach((button, buttonIndex) => {
        const isActive = buttonIndex === activeVideoIndex;
        button.classList.toggle('active', isActive);
        button.setAttribute('aria-selected', isActive ? 'true' : 'false');

        if (isActive && shouldFocus) {
          button.focus({ preventScroll: true });
        }
      });
    }

    async function fetchVideos(options) {
      const append = options && options.append;
      if (isLoadingVideos) {
        return;
      }

      isLoadingVideos = true;
      loadMoreButton.disabled = true;
      setRetryVisibility('videos', false);
      updateVideoStatus(append ? 'Loading more videos...' : 'Loading videos...');

      if (!append) {
        renderVideoSkeletons();
      }

      const params = new URLSearchParams({
        playlistId: PLAYLIST_ID,
        maxResults: String(VIDEO_PAGE_SIZE)
      });

      if (append && nextPageToken) {
        params.set('pageToken', nextPageToken);
      }

      try {
        const response = await fetch(`/api/getVideos?${params.toString()}`);
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Unable to load videos.');
        }

        const incoming = Array.isArray(data.items) ? data.items : [];
        videos = append ? videos.concat(incoming) : incoming;
        nextPageToken = data.nextPageToken || null;

        if (videos.length === 0) {
          rail.innerHTML = '';
          spotlightTitle.textContent = 'No videos found.';
          spotlightSub.textContent = 'Try again later.';
          updateVideoStatus('No videos are available for this playlist.');
          return;
        }

        renderRail();
        if (!append) {
          setActiveVideo(0, false, false);
        }

        updateVideoStatus(data.fromCache ? 'Loaded from cache.' : 'Loaded latest videos.');
      } catch (error) {
        console.error(error);
        updateVideoStatus('Unable to load videos right now. Please try again.');
        setRetryVisibility('videos', true);
      } finally {
        isLoadingVideos = false;
        loadMoreButton.disabled = !nextPageToken;
      }
    }

    async function loadSocials() {
      setRetryVisibility('socials', false);
      updateSocialStatus('Loading social feed...');
      renderSocialSkeletons();

      try {
        const response = await fetch(`/api/getSocials?maxResults=${SOCIAL_PAGE_SIZE}`);
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Unable to load social feed.');
        }

        const items = Array.isArray(data.items) ? data.items : [];

        if (items.length === 0) {
          updateSocialStatus('No social posts available yet.');
          return;
        }

        socialGrid.innerHTML = items.map((item) => {
          const mediaUrl = item.mediaUrl || '';
          const label = `${item.platform || 'social'} post`;
          const href = item.postUrl || '#';

          return `
            <a class="social-card" href="${escapeHtml(href)}" target="_blank" rel="noopener noreferrer" aria-label="Open ${escapeHtml(label)}">
              <img class="social-image" src="${escapeHtml(mediaUrl)}" alt="${escapeHtml(item.title || 'Social post')}" loading="lazy">
              <div class="social-copy">
                <p class="social-title">${escapeHtml(item.title || item.caption || 'Post')}</p>
                <div class="social-meta">${escapeHtml(item.platform || 'social')} • ${escapeHtml(formatDate(item.timestamp))}</div>
              </div>
            </a>
          `;
        }).join('');

        if (Array.isArray(data.warnings) && data.warnings.length > 0) {
          updateSocialStatus(`Feed loaded with warnings: ${data.warnings.join(' ')}`);
          return;
        }

        updateSocialStatus(data.fromCache ? 'Loaded social feed from cache.' : 'Loaded latest social posts.');
      } catch (error) {
        console.error(error);
        updateSocialStatus('Unable to load social feed right now. Please try again.');
        setRetryVisibility('socials', true);
      }
    }

    function handleRailKeyboard(event) {
      if (!videos.length) {
        return;
      }

      if (!['ArrowLeft', 'ArrowRight', 'Home', 'End'].includes(event.key)) {
        return;
      }

      event.preventDefault();
      if (event.key === 'ArrowLeft') {
        setActiveVideo(Math.max(activeVideoIndex - 1, 0), true, true);
        return;
      }

      if (event.key === 'ArrowRight') {
        setActiveVideo(Math.min(activeVideoIndex + 1, videos.length - 1), true, true);
        return;
      }

      if (event.key === 'Home') {
        setActiveVideo(0, true, true);
        return;
      }

      setActiveVideo(videos.length - 1, true, true);
    }

    loadMoreButton.addEventListener('click', function () {
      fetchVideos({ append: true });
    });
    videoRetryButton.addEventListener('click', function () {
      fetchVideos({ append: false });
    });
    socialRetryButton.addEventListener('click', function () {
      loadSocials();
    });
    rail.addEventListener('keydown', handleRailKeyboard);

    window.onYouTubeIframeAPIReady = function () {
      isYouTubeApiReady = true;
      if (videos.length > 0) {
        ensurePlayer(videos[activeVideoIndex].videoId, false);
      }
    };

    window.addEventListener('DOMContentLoaded', async function () {
      await fetchVideos({ append: false });
      await loadSocials();
    });
  </script>
</body>
</html>
